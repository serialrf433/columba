version: 2
updates:
  # Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    open-pull-requests-limit: 50
    reviewers:
      - "torlando-tech"
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 30
    reviewers:
      - "torlando-tech"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
